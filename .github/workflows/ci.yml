name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes-backend:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: todolist
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: chave-secreta-para-ci
      POSTGRES_DB: todolist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: config.settings.development

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Rodar testes
        working-directory: backend
        run: pytest apps/usuarios/tests.py apps/tarefas/tests.py -v

  testes-selenium:
    runs-on: ubuntu-latest
    needs: testes-backend

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Docker Compose
        run: docker compose version

      - name: Criar arquivo .env
        run: |
          echo "SECRET_KEY=chave-secreta-para-ci" >> .env
          echo "POSTGRES_DB=todolist" >> .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_HOST=db" >> .env
          echo "POSTGRES_PORT=5432" >> .env

      - name: Subir aplicacao
        run: docker compose up -d --build

      - name: Aguardar servicos ficarem prontos
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/usuarios/cadastro/ -X POST && break
            sleep 3
          done

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Selenium
        run: pip install -r selenium_tests/requirements.txt

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Rodar testes Selenium
        run: pytest selenium_tests/ -v

      - name: Derrubar aplicacao
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: [testes-backend, testes-selenium]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "/home/ubuntu/todolist" ]; then
              git clone https://github.com/GustavoQ-Mateus/todolist.git /home/ubuntu/todolist
            fi
            cd /home/ubuntu/todolist
            git pull origin main
            cat > .env <<EOF
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            POSTGRES_DB=todolist
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=db
            POSTGRES_PORT=5432
            VITE_API_URL=http://${{ secrets.EC2_HOST }}:8000/api
            EOF
            docker compose up -d --build
